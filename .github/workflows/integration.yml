name: integration

# Live-API integration suite. Manually dispatched only — the API spend
# is bounded by the per-test `LIVE_CACHE_BUDGET_USD` guardrail (default
# $0.10) and by the once-per-dispatch posture (no push/PR triggers).
on:
  workflow_dispatch:
    inputs:
      python-version:
        description: Python version to run against
        type: choice
        default: "3.11"
        options:
          - "3.11"
          - "3.12"
      model:
        description: Anthropic model to test against
        default: "claude-haiku-4-5"
        type: string

jobs:
  live-cache:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      LIVE_CACHE_MODEL: ${{ inputs.model }}
      # Fail fast on a misconfigured environment that would burn money.
      LIVE_CACHE_BUDGET_USD: "0.10"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: pip
      - name: Verify secret is set
        run: |
          if [ -z "${ANTHROPIC_API_KEY}" ]; then
            echo "::error::ANTHROPIC_API_KEY secret is empty — set the repo secret before re-running."
            exit 1
          fi
          echo "secret length: ${#ANTHROPIC_API_KEY}"
      - run: pip install -e '.[dev]' anthropic
      - name: Run integration suite
        run: pytest tests/integration -v --no-header
